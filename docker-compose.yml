version: '3.9'

services:
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_DB: dx7
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: ./backend/Dx7Api
      dockerfile: Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=dx7;Username=postgres;Password=postgres
      - Jwt__Key=Dx7-SuperSecretKey-ChangeInProduction-MinLength32Chars!
      - Jwt__Issuer=Dx7Api
      - Jwt__Audience=Dx7Client
      - Jwt__ExpiryHours=8
      - Cors__Origins__0=http://localhost:5173
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  pgdata:
